<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minchan's Sites</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e5e5ea;
      --text: #1d1d1f;
      --text-muted: #6e6e73;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --tag-bg: #ededfd;
      --tag-text: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-hover: 0 6px 20px rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d0d0f;
        --surface: #18181b;
        --border: #27272a;
        --text: #f4f4f5;
        --text-muted: #71717a;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --tag-bg: #1e1b4b;
        --tag-text: #818cf8;
        --shadow: 0 1px 3px rgba(0,0,0,0.4);
        --shadow-hover: 0 6px 20px rgba(0,0,0,0.5);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 4rem 2rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .search-wrap {
      max-width: 480px;
      margin: 1.75rem auto 0;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.75rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 2rem 5rem;
    }

    .meta {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.875rem;
      padding: 1.4rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-desc {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.4rem;
      line-height: 1.55;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.85rem;
    }

    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.1rem;
    }

    .card-date {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .card-link {
      display: inline-block;
      padding: 0.45rem 0.9rem;
      background: var(--accent);
      color: #fff;
      border-radius: 0.45rem;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .card-link:hover { background: var(--accent-hover); }

    .status {
      text-align: center;
      color: var(--text-muted);
      padding: 5rem 0;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1>Minchan's Sites</h1>
    <p>내가 만든 사이트 모음</p>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="이름, 설명, 태그로 검색..." autocomplete="off" oninput="filter()">
    </div>
  </header>

  <main>
    <div class="meta" id="meta"></div>
    <div class="grid" id="grid"></div>
    <div class="status" id="status">불러오는 중...</div>
  </main>

  <footer>
    minchan.app
  </footer>

  <script>
    // TODO: GitHub 레포 주소로 교체
    const JSON_URL = 'https://raw.githubusercontent.com/d-namolla0710/sites/main/sites.json';

    let all = [];

    async function init() {
      try {
        const res = await fetch(JSON_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        all = data.sites || [];
        render(all);
      } catch (e) {
        document.getElementById('status').textContent = '사이트 목록을 불러오지 못했어요. (' + e.message + ')';
      }
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      if (!q) { render(all); return; }
      render(all.filter(s =>
        s.name.toLowerCase().includes(q) ||
        (s.description || '').toLowerCase().includes(q) ||
        (s.tags || []).some(t => t.toLowerCase().includes(q))
      ));
    }

    function render(sites) {
      const grid = document.getElementById('grid');
      const status = document.getElementById('status');
      const meta = document.getElementById('meta');

      if (!sites.length) {
        grid.innerHTML = '';
        status.style.display = '';
        status.textContent = '해당하는 사이트가 없어요.';
        meta.textContent = '';
        return;
      }

      status.style.display = 'none';
      meta.textContent = `${sites.length}개`;
      grid.innerHTML = sites.map(s => `
        <div class="card">
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.description || '')}</div>
          ${s.tags?.length ? `<div class="card-tags">${s.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="card-footer">
            <span class="card-date">${esc(s.added || '')}</span>
            <a class="card-link" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">방문하기 →</a>
          </div>
        </div>
      `).join('');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
